<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dilnur Khurramov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      padding: 40px 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      margin-bottom: 14px;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #0d0d0d;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .name {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .bio {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 36px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .link-card:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    .link-card:active { transform: scale(0.98); }
    .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { width: 22px; height: 22px; }
    .tg-icon { background: rgba(41,182,246,0.15); }
    .yt-icon { background: rgba(255,70,70,0.15); }
    .li-icon { background: rgba(10,122,255,0.15); }
    .link-info { flex: 1; }
    .link-title { color: #fff; font-size: 15px; font-weight: 500; margin-bottom: 2px; }
    .link-url { color: rgba(255,255,255,0.38); font-size: 12px; }
    .arrow { color: rgba(255,255,255,0.2); font-size: 18px; flex-shrink: 0; }
    .footer { margin-top: 48px; color: rgba(255,255,255,0.15); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; }
  </style>
</head>
